services:
  db:
    image: postgres:17
    container_name: chewback_pg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chewback
      POSTGRES_INITDB_ARGS: --lc-messages=en_US.UTF-8
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chewback"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
